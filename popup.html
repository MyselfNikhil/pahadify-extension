<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #8b5cf6 100%);
            padding: 20px;
            text-align: center;
            color: white;
        }
        .header h2 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .content {
            padding: 25px 20px;
            text-align: center;
        }
        .status {
            display: inline-block;
            background: #e0e7ff;
            color: #4f46e5;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .instructions {
            font-size: 0.95rem;
            color: #334155;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .btn-action {
            display: block;
            width: 100%;
            box-sizing: border-box;
            background: #0f172a;
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            transition: transform 0.2s;
        }
        .btn-action:hover {
            transform: translateY(-2px);
            background: #1e293b;
        }
        .footer {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>PAHADIFY</h2>
    </div>
    <div class="content">
        <div class="status">Pahadify Image Converter</div>
        <p class="instructions">
            <strong>Right-click</strong> any image on the web to instantly convert it to JPG, PNG, or WebP. 
            <br><br>
            This extension is powerful, secure and completely private. 
        </p>
        
        <a href="https://thepahadify.com/" target="_blank" class="btn-action">
            Explore more powerful tools, click here.
        </a>
        
        <div class="footer">
            Made in <strong>Mountains For World</strong>
        </div>
    </div>
</body>
</html>
